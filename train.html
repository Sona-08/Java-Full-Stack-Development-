<html>
<body>
<h1 style="background-color:blue; color:white; text-align:center;">TRAIN SEAT RESERVATION CHECKING</h1>
<br><br>
<center>
<input type="number" id="seatno" placeholder="Enter seat number"><br><br>
<input type="number" id="class" placeholder="Enter Class Type[2/3]">

<br><br>
<button onclick="seat()">CLICK HERE </button>
<h2 id="res"></h2>
</center>
<script>
function seat(){
let n=document.getElementById("seatno").value
let c=document.getElementById("class").value
if(c==3){
	if(n<=0 || n>80)
	{
	document.getElementById("res").textContent="Invalid Seat Number!   :("

	}
	else if(n%8===1 || n%8===4)
	{
		document.getElementById("res").textContent="Your Seat: Lower"
	}
	else if(n%8 ===2 || n%8===5)
	{
		document.getElementById("res").textContent="Your Seat: Middle"
	}
	else if(n%8 === 3 || n%8===6)
	{
		document.getElementById("res").textContent="Your Seat: Upper"
	}
	else if(n%8 === 7)
	{
		document.getElementById("res").textContent="Your Seat: Side Lower"
	}
	else if(n%8 === 0)
	{
		document.getElementById("res").textContent="Your Seat: Side Upper"
	}
}

else
{
	if(n<=0 || n>60)
	{
		document.getElementById("res").textContent="Invalid Seat Number!   :("
	}
	else if(n%6===1 || n%6===3)
	{
		document.getElementById("res").textContent="Your Seat: Lower"
	}
	else if(n%6 ===2 || n%6===4)
	{
		document.getElementById("res").textContent="Your Seat: Upper"
	}
	else if(n%6 === 5){
		document.getElementById("res").textContent="Your Seat: Side Lower"
	}
	else if(n%6 === 0)
	{
		document.getElementById("res").textContent="Your Seat: Side Upper"
	}

}

}
</script>
</body>
</html>
