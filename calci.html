<html>
<body>
<h1>BASIC CALCULATOR</h1>
<input type="number" id="num1" placeholder="Enter first number"/>
<input type="number" id="num2" placeholder="Enter second number"/>
<br>
<br>
<button onclick="add()">ADD</button>
<button onclick="sub()">SUBTRACT</button>
<button onclick="mul()">MULTIPLY</button>
<button onclick="quo()">QUOTIENT</button>
<button onclick="rem()">REMAINDER</button>

<h2 id="result"></h2>


<script>
function add(){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let sum=Number(n1)+Number(n2);
document.getElementById("result").textContent="Result: " +sum;
}

function sub(){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let minus=Number(n1)-Number(n2);
document.getElementById("result").textContent="Result: " +minus;
}

function mul(){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let mult=Number(n1)*Number(n2);
document.getElementById("result").textContent="Result: " +mult;
}

function quo(){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let qt=Number(n1)/Number(n2);
document.getElementById("result").textContent="Result: " +qt;
}

function rem(){
let n1=document.getElementById("num1").value;
let n2=document.getElementById("num2").value;
let r=Number(n1)%Number(n2);
document.getElementById("result").textContent="Result: " +r;
}

</script>
</body>
</html>
